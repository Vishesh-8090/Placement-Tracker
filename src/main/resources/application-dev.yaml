spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/placement_tracker
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE